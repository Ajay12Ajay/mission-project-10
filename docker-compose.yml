version: '3.8'
services:
  frontend:
    container_name: frontend-container
    build:
      context: ./ORSPROJECT-10-UI      
    ports:
      - "4200:80"
    depends_on:
      - backend  
    networks:
      - my-network  

  backend:
    container_name: backend-container
    build:
      context: ./ORSproject-10         
    depends_on:
      - mysql        
    ports:
      - "8080:8080"
    networks:
      - my-network
    # Add this line to fix hostname resolution
    extra_hosts:
      - "mysql:host-gateway"

  mysql:
    container_name: mysql
    image: mysql:8.0        
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: project_10      
    ports:
      - "3308:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
    networks:
      - my-network
 
networks:
  my-network:
    driver: bridge    

volumes:
  mysql_data:
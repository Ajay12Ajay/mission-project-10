<style>
  .hm {
    background-image: url('assets/img/welcome.png');
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-size: cover;
    padding-top: 200px;
    padding-bottom: 175px;
  }
</style>
<app-navbar></app-navbar>

<div class="hm">
  <div class="row pt-3">
    <div class="col-md-4"></div>

    <div class="col-md-4">
      <div class="card input-group-addon">
        <div class="card-body">

          <!-- Title -->
          <h3 class="text-center text-primary" *ngIf="!form.data.id">
            Add Policy
          </h3>

          <h3 class="text-center text-primary" *ngIf="form.data.id > 0">
            Update Policy
          </h3>

          <!-- Success -->
          <div *ngIf="!form.error && form.message"
               class="alert alert-success text-center">
            {{ form.message }}
          </div>

          <!-- Error -->
          <div *ngIf="form.error && form.message"
               class="alert alert-danger text-center">
            {{ form.message }}
          </div>

          <!-- Policy ID -->
          <span><b>Policy ID</b> *</span>
          <input type="text" class="form-control mb-2"
                 [(ngModel)]="form.data.policyId"
                 name="policyId"
                 placeholder="Enter Policy ID">
          <small class="text-danger">{{ form.inputerror.policyId }}</small>


          <!-- Policy Name -->
          <span><b> Policy Name</b> *</span>
          <input type="text" class="form-control mb-2"
                 [(ngModel)]="form.data.policyName"
                 name="policyName"
                 placeholder="Enter Policy Name">
          <small class="text-danger">{{ form.inputerror.policyName }}</small>

          <!-- Premium Amount  -->
          <span><b> Premium Amount</b> *</span>
          <input type="number" class="form-control mb-2"
                 [(ngModel)]="form.data.premiumAmount"
                 name="premiumAmount"
                 placeholder="Enter Premium Amount">
          <small class="text-danger">{{ form.inputerror.premiumAmount }}</small>

          <!-- Start Date -->
            <span><b>Start Date</b> <span style="color: red;">*</span></span><br>
            <div class="col-sm-12">                            
                <input type="date" class="form-control" name="startDate"
                  [(ngModel)]="form.data.startDate"
                  [ngModel]="form.data.startDate | date:'yyyy-MM-dd'"
                  placeholder="Enter Start Date"
                  style="width: 97%;">              
            </div>
            <small class="text-danger">{{ form.inputerror.startDate }}</small>
            

          

          <!-- Buttons -->
          <div class="text-center mt-3">
            <button class="btn btn-success" (click)="submit()">Save</button>
            &nbsp;
            <button class="btn btn-warning"
                    (click)="forward('policylist')">List</button>
          </div>

        </div>
      </div>
    </div>

    <div class="col-md-4"></div>
  </div>
</div>

<app-footer></app-footer>

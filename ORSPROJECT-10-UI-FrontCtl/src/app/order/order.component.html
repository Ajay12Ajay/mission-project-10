<style>
  .hm {
    background-image: url('assets/img/welcome.png');
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-size: cover;
    padding-top: 200px;
    padding-bottom: 175px;
  }
</style>
<app-navbar></app-navbar>

<div class="hm">
  <div class="row pt-3">
    <div class="col-md-4"></div>

    <div class="col-md-4">
      <div class="card input-group-addon">
        <div class="card-body">

          <!-- Title -->
          <h3 class="text-center text-primary" *ngIf="!form.data.id">
            Add Order
          </h3>

          <h3 class="text-center text-primary" *ngIf="form.data.id > 0">
            Update Order
          </h3>

          <!-- Success -->
          <div *ngIf="!form.error && form.message"
               class="alert alert-success text-center">
            {{ form.message }}
          </div>

          <!-- Error -->
          <div *ngIf="form.error && form.message"
               class="alert alert-danger text-center">
            {{ form.message }}
          </div>

          <!-- Order Code -->
          <span><b>Order Code</b> *</span>
          <input type="text" class="form-control mb-2"
                 [(ngModel)]="form.data.orderCode"
                 name="orderCode"
                 placeholder="Enter Order Code">
          <small class="text-danger">{{ form.inputerror.orderCode }}</small>

          <!-- Customer Name -->
          <span><b>Customer Name</b> *</span>
          <input type="text" class="form-control mb-2"
                 [(ngModel)]="form.data.customerName"
                 name="customerName"
                 placeholder="Enter Customer Name">
          <small class="text-danger">{{ form.inputerror.customerName }}</small>

          <!-- Total Amount -->
          <span><b>Total Amount</b> *</span>
          <input type="number" class="form-control mb-2"
                 [(ngModel)]="form.data.totalAmount"
                 name="totalAmount"
                 placeholder="Enter Total Amount">
          <small class="text-danger">{{ form.inputerror.totalAmount }}</small>

          <!-- Status -->
          <span><b>Status</b> *</span>
          <select class="form-control mb-2"
                  [(ngModel)]="form.data.status"
                  name="status">
            <option value="undefined">--Select--</option>
            <option value="Pending">Pending</option>
            <option value="Processing">Processing</option>
            <option value="Delivered">Delivered</option>
          </select>
          <small class="text-danger">{{ form.inputerror.status }}</small>

          <!-- Buttons -->
          <div class="text-center mt-3">
            <button class="btn btn-success" (click)="submit()">Save</button>
            &nbsp;
            <button class="btn btn-warning"
                    (click)="forward('orderlist')">List</button>
          </div>

        </div>
      </div>
    </div>

    <div class="col-md-4"></div>
  </div>
</div>

<app-footer></app-footer>
